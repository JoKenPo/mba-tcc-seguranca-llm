sonar.projectKey=gemini-security-audit
sonar.projectName=Gemini Security TCC
sonar.projectVersion=1.0

# Define onde estão os códigos fontes. 
# Estamos incluindo todas as pastas c1, c2, c3, c4.
sonar.sources=c1,c2,c3,c4

# Exclusões para evitar ruído na análise
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.test.js,**/*.spec.js,**/test/**

# Configuração explícita da linguagem (embora seja auto-detectada)
sonar.language=js
sonar.sourceEncoding=UTF-8

# Caminho para relatórios de cobertura (se existirem)
# sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
